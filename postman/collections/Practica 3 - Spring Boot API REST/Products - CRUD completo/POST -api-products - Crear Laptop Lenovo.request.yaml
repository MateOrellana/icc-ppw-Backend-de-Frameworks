$kind: http-request
name: POST /api/products - Crear Laptop Lenovo
url: http://localhost:8080/api/products
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Laptop Lenovo",
      "price": 850.50,
      "stock": 10
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.collectionVariables.set("productId1", json.id);
    language: text/javascript
order: 1000
