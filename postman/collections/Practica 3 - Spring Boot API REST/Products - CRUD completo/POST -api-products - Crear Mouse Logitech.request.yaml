$kind: http-request
name: POST /api/products - Crear Mouse Logitech
url: http://localhost:8080/api/products
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Mouse Logitech",
      "price": 25.99,
      "stock": 40
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.collectionVariables.set("productId2", json.id);
    language: text/javascript
order: 2000
