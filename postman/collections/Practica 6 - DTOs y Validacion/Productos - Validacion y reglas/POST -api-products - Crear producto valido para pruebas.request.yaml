$kind: http-request
name: POST /api/products - Crear producto valido para pruebas
url: http://localhost:8080/api/products
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Monitor Samsung",
      "price": 230.75,
      "stock": 8
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Debe crear el producto", function () {
        pm.response.to.have.status(200);
      });

      const data = pm.response.json();
      pm.collectionVariables.set("validationProductId", data.id);
    language: text/javascript
order: 2000
