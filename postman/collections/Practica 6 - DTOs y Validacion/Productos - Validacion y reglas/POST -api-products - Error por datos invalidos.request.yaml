$kind: http-request
name: POST /api/products - Error por datos invalidos
url: http://localhost:8080/api/products
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "",
      "price": -5,
      "stock": -1
    }
