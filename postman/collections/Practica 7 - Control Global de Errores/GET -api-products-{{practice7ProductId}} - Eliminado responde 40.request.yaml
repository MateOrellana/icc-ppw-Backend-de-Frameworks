$kind: http-request
name: GET /api/products/{{practice7ProductId}} - Eliminado responde 404
url: http://localhost:8080/api/products/{{practice7ProductId}}
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Debe responder 404", function () {
        pm.response.to.have.status(404);
      });

      pm.test("Debe ocultar el eliminado logico", function () {
        const body = pm.response.json();
        pm.expect(body.status).to.eql(404);
        pm.expect(body.message).to.eql("Product not found");
      });
    language: text/javascript
order: 6000
